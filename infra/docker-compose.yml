services:
  opensearch:
    build:
      context: ./opensearch
      dockerfile: Dockerfile
    container_name: firmable-opensearch
    environment:
      discovery.type: single-node
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: -Xms4g -Xmx4g
      node.name: dev-node
      cluster.name: firmable-cluster
      node.roles: data,master,ingest,ml
      # ML Commons — required for local embedding model execution on a combined node
      plugins.ml_commons.only_run_on_ml_node: "false"
      plugins.ml_commons.max_ml_task_per_node: "10"
      plugins.ml_commons.allow_registering_model_via_url: "true"
      plugins.ml_commons.native_memory_threshold: "99"
      plugins.ml_commons.model_auto_deploy.enable: "true"
    volumes:
      - opensearch-data:/var/lib/opensearch
      - ./opensearch/index.json:/usr/share/opensearch/config/index.json:ro
      - ../app/search/synonyms.txt:/usr/share/opensearch/config/analysis/synonyms.txt:ro
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - firmable
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9200/_cluster/health
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.1.0
    container_name: firmable-opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: "[\"http://opensearch:9200\"]"
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:5601/api/status" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - firmable

  # Step 3: ollama service — ollama/ollama image, persistent model cache volume, port 11434
  ollama:
    image: ollama/ollama
    container_name: firmable-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - firmable

  # Step 4: api placeholder — python http.server on 8000, wired to opensearch and ollama.
  # Replace image + command with the FastAPI build context in P3-T01.
  api:
    image: python:3.12-slim
    container_name: firmable-api
    command: [ "python", "-m", "http.server", "8000" ]
    ports:
      - "8000:8000"
    environment:
      OPENSEARCH_URL: "http://opensearch:9200"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-gemma3:4b}"
    depends_on:
      opensearch:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - firmable

  # Step 5: web placeholder — nginx:alpine on 3000, mapped to the web/ source directory.
  # Replace with the final static build in P4-T06.
  web:
    image: nginx:alpine
    container_name: firmable-web
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started
    networks:
      - firmable

networks:
  firmable:
    driver: bridge

volumes:
  opensearch-data:
  ollama-models:
